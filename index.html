<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Find Someone Who… Bingo</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg:        #fef9f0;
  --bg2:       #fff;
  --ink:       #1a1a2e;
  --muted:     #8b8fa8;
  --border:    #e8e4dc;
  --c1: #ff6b6b;
  --c2: #ffa94d;
  --c3: #51cf66;
  --c4: #339af0;
  --c5: #cc5de8;
  --stamp:     #51cf66;
  --stamp-bg:  rgba(81,207,102,.13);
  --win-gold:  #f59f00;
  --radius:    18px;
  --cell-r:    14px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  min-height: 100%; height: 100%;
  background: var(--bg);
  font-family: 'Nunito', sans-serif;
  color: var(--ink);
}
body {
  display: flex; flex-direction: column;
  align-items: center;
  padding: 0 16px 60px;
}

/* ── HEADER ── */
.top {
  width: 100%; max-width: 620px;
  padding: 28px 0 10px;
  text-align: center;
}
.logo-row {
  display: flex; align-items: center; justify-content: center; gap: 10px;
  margin-bottom: 4px;
}
.logo-icon {
  width: 48px; height: 48px; border-radius: 14px;
  background: var(--ink); color: var(--bg);
  font-size: 1.5rem; display: flex; align-items: center; justify-content: center;
  font-family: 'Baloo 2', cursive; font-weight: 800;
  letter-spacing: -.04em; flex-shrink: 0;
}
h1 {
  font-family: 'Baloo 2', cursive;
  font-size: clamp(1.7rem, 5vw, 2.4rem);
  font-weight: 800; line-height: 1; color: var(--ink);
  letter-spacing: -.02em;
}
.tagline {
  font-size: .9rem; color: var(--muted); font-weight: 600;
  margin-top: 4px;
}

/* ── DIALOGUE HINT ── */
.hint-strip {
  width: 100%; max-width: 620px;
  background: var(--bg2); border: 1.5px solid var(--border);
  border-radius: var(--radius); padding: 14px 18px;
  margin: 18px 0 14px;
  display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
}
.bubble {
  border-radius: 12px; padding: 10px 14px;
  font-size: .82rem; line-height: 1.5; font-weight: 600;
}
.bubble-ask  { background: #e7f5ff; color: #1864ab; border-bottom-left-radius: 4px; }
.bubble-ans  { background: #ebfbee; color: #2b8a3e; border-bottom-right-radius: 4px; text-align: right; }
.bubble .who { font-size: .68rem; font-weight: 800; letter-spacing: .06em; text-transform: uppercase; opacity: .7; margin-bottom: 3px; }

/* ── CONTROLS ── */
.controls {
  width: 100%; max-width: 620px;
  display: flex; gap: 8px; justify-content: space-between; align-items: center;
  margin-bottom: 16px; flex-wrap: wrap;
}
.ctrl-left { display: flex; gap: 8px; flex-wrap: wrap; }
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 9px 18px; border-radius: 10px;
  font-family: 'Nunito', sans-serif; font-size: .84rem; font-weight: 800;
  cursor: pointer; border: 2px solid transparent;
  transition: transform .12s, filter .12s;
  white-space: nowrap;
}
.btn:active { transform: scale(.95); }
.btn-dark {
  background: var(--ink); color: var(--bg);
  border-color: var(--ink);
}
.btn-dark:hover { filter: brightness(1.2); }
.btn-outline {
  background: transparent; color: var(--ink);
  border-color: var(--border);
}
.btn-outline:hover { background: var(--bg2); border-color: #c8c4bc; }
.score-pill {
  font-family: 'Baloo 2', cursive; font-size: .88rem; font-weight: 700;
  color: var(--muted); padding: 8px 14px;
  background: var(--bg2); border: 1.5px solid var(--border);
  border-radius: 10px; white-space: nowrap;
}
.score-pill span { color: var(--ink); }

/* ── BINGO GRID ── */
.grid-wrap {
  width: 100%; max-width: 620px;
  position: relative;
}
.bingo-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  width: 100%;
}
.cell {
  aspect-ratio: 1;
  background: var(--bg2);
  border: 2px solid var(--border);
  border-radius: var(--cell-r);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 10px 8px;
  cursor: pointer;
  position: relative; overflow: hidden;
  transition: border-color .18s, background .18s, transform .14s, box-shadow .18s;
  user-select: none;
  text-align: center;
}
.cell:hover {
  border-color: #bbb7ae;
  background: #fffdf7;
  transform: translateY(-2px);
  box-shadow: 0 4px 16px rgba(0,0,0,.07);
}
.cell-emoji {
  font-size: clamp(1.6rem, 4.5vw, 2.2rem);
  line-height: 1; margin-bottom: 6px;
  transition: transform .2s;
}
.cell-text {
  font-size: clamp(.62rem, 1.5vw, .8rem);
  font-weight: 700; color: var(--ink);
  line-height: 1.3;
}

/* ── STAMPED STATE ── */
.cell.stamped {
  background: var(--stamp-bg);
  border-color: var(--stamp);
  transform: none;
  box-shadow: none;
}
.cell.stamped .cell-emoji { transform: scale(.85); }
.cell.stamped .cell-text { color: #2b8a3e; }
.stamp-mark {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  pointer-events: none;
  opacity: 0; transform: scale(1.4);
  transition: opacity .18s, transform .18s;
}
.cell.stamped .stamp-mark {
  opacity: 1; transform: scale(1);
}
.stamp-mark svg {
  width: clamp(44px, 11vw, 64px);
  height: clamp(44px, 11vw, 64px);
}

/* ── NAME INPUT on stamped cells ── */
.name-field {
  position: absolute; bottom: 6px; left: 6px; right: 6px;
  background: rgba(255,255,255,.9);
  border: 1.5px solid var(--stamp);
  border-radius: 7px;
  font-family: 'Nunito', sans-serif; font-size: .72rem; font-weight: 700;
  color: #2b8a3e; padding: 3px 7px;
  text-align: center; outline: none;
  display: none;
}
.cell.stamped .name-field { display: block; }
.name-field::placeholder { color: rgba(43,138,62,.45); font-weight: 600; }

/* ── WIN LINE HIGHLIGHT ── */
.cell.win-line {
  border-color: var(--win-gold) !important;
  background: rgba(245,159,0,.12) !important;
  animation: pulse-win .55s ease-out;
}
@keyframes pulse-win {
  0%   { box-shadow: 0 0 0 0 rgba(245,159,0,.6); }
  70%  { box-shadow: 0 0 0 12px rgba(245,159,0,0); }
  100% { box-shadow: none; }
}

/* ── WIN BANNER ── */
.win-banner {
  position: fixed; inset: 0; z-index: 500;
  display: flex; align-items: center; justify-content: center;
  background: rgba(26,26,46,.55);
  backdrop-filter: blur(6px);
  opacity: 0; pointer-events: none;
  transition: opacity .3s;
}
.win-banner.show { opacity: 1; pointer-events: auto; }
.win-card {
  background: var(--bg2); border-radius: 28px;
  padding: 40px 48px; text-align: center;
  border: 2px solid var(--border);
  box-shadow: 0 24px 64px rgba(0,0,0,.18);
  animation: bounce-in .4s cubic-bezier(.34,1.56,.64,1);
  max-width: 340px; width: 90%;
}
@keyframes bounce-in {
  from { transform: scale(.6); opacity: 0; }
  to   { transform: scale(1);  opacity: 1; }
}
.win-trophy { font-size: 4rem; margin-bottom: 8px; }
.win-title {
  font-family: 'Baloo 2', cursive; font-size: 2.2rem;
  font-weight: 800; color: var(--win-gold);
  letter-spacing: -.02em; margin-bottom: 4px;
}
.win-sub { font-size: .9rem; color: var(--muted); font-weight: 600; margin-bottom: 24px; }
.win-btn {
  display: inline-flex; align-items: center; gap: 8px;
  background: var(--ink); color: var(--bg);
  border: none; border-radius: 12px;
  font-family: 'Nunito', sans-serif; font-size: 1rem; font-weight: 800;
  padding: 13px 28px; cursor: pointer;
  transition: filter .15s, transform .12s;
}
.win-btn:hover { filter: brightness(1.25); }
.win-btn:active { transform: scale(.96); }

/* ── CONFETTI CANVAS ── */
#confetti { position: fixed; inset: 0; pointer-events: none; z-index: 490; }

/* ── COLOUR DOTS header for cells ── */
.cell-color-bar {
  position: absolute; top: 0; left: 0; right: 0; height: 4px;
  border-radius: var(--cell-r) var(--cell-r) 0 0;
}

/* stagger entrance */
.cell { animation: cell-in .35s ease-out both; }
.cell:nth-child(1){animation-delay:.03s}
.cell:nth-child(2){animation-delay:.06s}
.cell:nth-child(3){animation-delay:.09s}
.cell:nth-child(4){animation-delay:.12s}
.cell:nth-child(5){animation-delay:.15s}
.cell:nth-child(6){animation-delay:.18s}
.cell:nth-child(7){animation-delay:.21s}
.cell:nth-child(8){animation-delay:.24s}
.cell:nth-child(9){animation-delay:.27s}
@keyframes cell-in {
  from { opacity: 0; transform: scale(.8) translateY(8px); }
  to   { opacity: 1; transform: scale(1) translateY(0); }
}

/* ── LEGEND ── */
.legend {
  width: 100%; max-width: 620px;
  margin-top: 16px;
  display: flex; gap: 8px; flex-wrap: wrap; justify-content: center;
}
.legend-item {
  display: flex; align-items: center; gap: 5px;
  font-size: .74rem; font-weight: 700; color: var(--muted);
}
.legend-dot { width: 10px; height: 10px; border-radius: 50%; }

@media print {
  .controls, .hint-strip, .win-banner, #confetti { display: none !important; }
  body { background: white; }
  .cell { border: 1.5px solid #ccc !important; break-inside: avoid; }
  .cell.stamped { background: #f0fff4 !important; }
}
@media (max-width: 420px) {
  .hint-strip { grid-template-columns: 1fr; }
  .bubble-ans { text-align: left; }
}
</style>
</head>
<body>

<canvas id="confetti"></canvas>

<div class="top">
  <div class="logo-row">
    <div class="logo-icon">B!</div>
    <h1>Find Someone Who…</h1>
  </div>
  <p class="tagline">Past Simple · "Did you…?" · Get three in a row to win 🏆</p>
</div>

<div class="hint-strip">
  <div class="bubble bubble-ask">
    <div class="who">You ask →</div>
    "Did you <strong>eat chocolate</strong> yesterday?"
  </div>
  <div class="bubble bubble-ans">
    <div class="who">← They answer</div>
    "Yes, I did!" → Write their name in the box
  </div>
</div>

<div class="controls">
  <div class="ctrl-left">
    <button class="btn btn-dark" onclick="shuffleGrid()">🔀 Shuffle</button>
    <button class="btn btn-outline" onclick="resetGrid()">↺ New game</button>
  </div>
  <div class="score-pill">Stamped: <span id="stampCount">0</span> / 9</div>
</div>

<div class="grid-wrap">
  <div class="bingo-grid" id="grid"></div>
</div>

<div class="legend" id="legend"></div>

<div class="win-banner" id="winBanner">
  <div class="win-card">
    <div class="win-trophy">🏆</div>
    <div class="win-title">BINGO!</div>
    <div class="win-sub" id="winSub">Three in a row — fantastic work!</div>
    <button class="win-btn" onclick="resetGrid()">🔀 Play again</button>
  </div>
</div>

<script>
const ALL_ITEMS = [
  { emoji:'🍫', text:'ate chocolate yesterday',  color:'#ff6b6b' },
  { emoji:'🎮', text:'played video games',        color:'#f76707' },
  { emoji:'📚', text:'read a book',               color:'#339af0' },
  { emoji:'🌳', text:'went to the park',          color:'#51cf66' },
  { emoji:'🛁', text:'had a bath or shower',      color:'#cc5de8' },
  { emoji:'🎨', text:'painted or drew something', color:'#f59f00' },
  { emoji:'🐕', text:'played with a pet',         color:'#339af0' },
  { emoji:'📺', text:'watched a film or TV',      color:'#ff6b6b' },
  { emoji:'🍕', text:'ate pizza',                 color:'#f76707' },
  { emoji:'⚽', text:'played sport outside',      color:'#51cf66' },
  { emoji:'🎵', text:'listened to music',         color:'#cc5de8' },
  { emoji:'🛒', text:'went shopping',             color:'#f59f00' },
  { emoji:'🍦', text:'ate ice cream',             color:'#339af0' },
  { emoji:'🚗', text:'went on a car trip',        color:'#ff6b6b' },
  { emoji:'💤', text:'slept in late',             color:'#f76707' },
  { emoji:'📱', text:'called a friend or family', color:'#51cf66' },
  { emoji:'🧁', text:'baked something',           color:'#cc5de8' },
  { emoji:'🎠', text:'visited somewhere fun',     color:'#f59f00' },
];

const LINES = [
  [0,1,2],[3,4,5],[6,7,8],   // rows
  [0,3,6],[1,4,7],[2,5,8],   // cols
  [0,4,8],[2,4,6]            // diagonals
];

let items = [];       // current 9
let stamped = new Set();
let won = false;
let winLine = [];

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function shuffleGrid() {
  stamped.clear(); won = false; winLine = [];
  items = shuffle(ALL_ITEMS).slice(0, 9);
  renderGrid();
}

function resetGrid() {
  document.getElementById('winBanner').classList.remove('show');
  shuffleGrid();
}

function renderGrid() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  document.getElementById('stampCount').textContent = 0;

  items.forEach((item, i) => {
    const cell = document.createElement('div');
    cell.className = 'cell';
    cell.dataset.index = i;

    cell.innerHTML = `
      <div class="cell-color-bar" style="background:${item.color}"></div>
      <div class="cell-emoji">${item.emoji}</div>
      <div class="cell-text">…${item.text}</div>
      <div class="stamp-mark">
        <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="32" cy="32" r="28" stroke="#51cf66" stroke-width="4" stroke-dasharray="6 3" opacity=".5"/>
          <path d="M18 32 L28 42 L46 22" stroke="#51cf66" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <input class="name-field" type="text" maxlength="14" placeholder="Write name…" onclick="event.stopPropagation()" />
    `;

    cell.addEventListener('click', () => toggleCell(i));
    grid.appendChild(cell);
  });

  // re-animate entrance
  grid.querySelectorAll('.cell').forEach((c, i) => {
    c.style.animationDelay = (i * 0.03 + 0.02) + 's';
  });

  renderLegend();
}

function toggleCell(i) {
  if (won) return;
  const cells = document.querySelectorAll('.cell');
  const cell = cells[i];

  if (stamped.has(i)) {
    stamped.delete(i);
    cell.classList.remove('stamped', 'win-line');
  } else {
    stamped.add(i);
    cell.classList.add('stamped');
    // micro bounce
    cell.animate([
      { transform: 'scale(1)' },
      { transform: 'scale(1.08)' },
      { transform: 'scale(1)' }
    ], { duration: 220, easing: 'ease-out' });
  }

  document.getElementById('stampCount').textContent = stamped.size;
  checkWin();
}

function checkWin() {
  const line = LINES.find(l => l.every(i => stamped.has(i)));
  if (!line) return;

  won = true;
  winLine = line;
  const cells = document.querySelectorAll('.cell');
  line.forEach(i => cells[i].classList.add('win-line'));

  const names = line
    .map(i => cells[i].querySelector('.name-field').value.trim())
    .filter(Boolean);

  const sub = names.length
    ? `Line completed with ${names.join(', ')} — great questions! 🌟`
    : 'Three in a row — fantastic work!';
  document.getElementById('winSub').textContent = sub;

  setTimeout(() => {
    document.getElementById('winBanner').classList.add('show');
    launchConfetti();
  }, 380);
}

/* ── LEGEND ── */
function renderLegend() {
  const legend = document.getElementById('legend');
  legend.innerHTML = '';
  const shown = new Map();
  items.forEach(it => {
    if (!shown.has(it.color)) shown.set(it.color, it.emoji);
  });
}

/* ── CONFETTI ── */
function launchConfetti() {
  const canvas = document.getElementById('confetti');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  const colors = ['#ff6b6b','#ffa94d','#51cf66','#339af0','#cc5de8','#f59f00','#74c0fc'];
  const pieces = Array.from({ length: 120 }, () => ({
    x: Math.random() * canvas.width,
    y: -10 - Math.random() * 60,
    w: 8 + Math.random() * 8,
    h: 4 + Math.random() * 5,
    rot: Math.random() * Math.PI * 2,
    vx: (Math.random() - .5) * 3,
    vy: 2.5 + Math.random() * 3,
    vr: (Math.random() - .5) * .15,
    color: colors[Math.floor(Math.random() * colors.length)],
    alpha: 1,
  }));

  let frame;
  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    let alive = false;
    pieces.forEach(p => {
      if (p.y > canvas.height + 20) return;
      alive = true;
      p.x += p.vx; p.y += p.vy; p.rot += p.vr;
      p.alpha = Math.max(0, 1 - p.y / (canvas.height * .85));
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot);
      ctx.globalAlpha = p.alpha;
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
      ctx.restore();
    });
    if (alive) frame = requestAnimationFrame(draw);
    else ctx.clearRect(0, 0, canvas.width, canvas.height);
  }
  if (frame) cancelAnimationFrame(frame);
  draw();
}

/* ── INIT ── */
shuffleGrid();
</script>
</body>
</html>
